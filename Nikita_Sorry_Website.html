<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Nikita ❤️</title>
<style>
body{
margin:0;
overflow:hidden;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ffb6d9,#ffe6f2);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}
.card{
background:rgba(255,255,255,.95);
padding:30px;
border-radius:30px;
max-width:600px;
box-shadow:0 0 30px rgba(0,0,0,.15);
z-index:2;
}
h1{color:#ff4081}
p{font-size:20px;line-height:1.8}
.btn{
padding:14px 28px;
border:none;
border-radius:30px;
font-size:18px;
margin:10px;
cursor:pointer;
}
.yes{background:#ff4081;color:white}
.no{background:#ddd}
.emoji{
position:absolute;
font-size:30px;
animation:fall linear infinite;
}
@keyframes fall{
from{transform:translateY(-100px)}
to{transform:translateY(110vh)}
}
#result{
font-size:26px;
margin-top:15px;
color:#ff4081;
font-weight:bold;
}
.teddy{font-size:70px}
</style>
</head>
<body>
<div class="card">
<div class="teddy">🧸💖</div>
<h1>Dear Nikita 🥺</h1>
<p>
I am really sorry Nikita... 🥺<br>
Mala maaf kr plzzz... 🙏💔<br>
Nko chidu yrr mazhya vr 😞<br><br>
Tu majhyasathi khup special ahes. 🌹💕<br>
Tujha smile khup miss karto... 🥹❤️<br>
Please ek chance de na... 🌸✨
</p>
<button class="btn yes" onclick="forgive()">💖 I Forgive You</button>
<button class="btn no" id="no">😒 No</button>
<div id="result"></div>
</div>

<script>
function create(e){
const s=document.createElement('div');
s.className='emoji';
s.innerHTML=e;
s.style.left=Math.random()*100+'vw';
s.style.animationDuration=(4+Math.random()*5)+'s';
document.body.appendChild(s);
setTimeout(()=>s.remove(),9000);
}
setInterval(()=>{
create('❤️');
create('🌸');
create('🌹');
create('✨');
},300);

function forgive(){
document.getElementById('result').innerHTML=
'🥹❤️ Thank You Nikita! You made my day! 🌹💖';
}

const no=document.getElementById('no');
no.addEventListener('mouseover',()=>{
no.style.position='relative';
no.style.left=(Math.random()*250-125)+'px';
no.style.top=(Math.random()*150-75)+'px';
});
</script>
</body>
</html>
